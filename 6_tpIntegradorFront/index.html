<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>

    <link rel="icon" href="./img/logoCasaca.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/styles.css">
    <script defer src="./js/main.js" ></script>

</head>
<body>
    <header>
        <div class = "contenedor-header-login">
                <img class= "logo-img-login" src="./img/logoCasaca.png" alt="iconoPagina">
                <h1 class= "titulo-header">Mundo Casaca</h1>
        </div>
    </header>

    <main>
        <div class="contenedor-bienvenida">
            <h2 class ="texto-bienvenida">Bienvenido/a</h2>
            <h3 class ="texto-nombre">Introduci tu nombre</h3>
            <form id="form-bienvenida">
                <input type="text" name="" id="input-nombre" required>
                <input class="btn-entrar" type="submit" value="Enviar">
            </form>
        </div>

    </main>

    <script>
        //formulario de bienvenida
        let formBienvenida = document.getElementById("form-bienvenida");
        formBienvenida.addEventListener("submit", event =>{
            event.preventDefault(); // Evitamos el envio por defecto del formulario

            // Extraemos el valor del campo de texto
            let nombreUsuario = document.getElementById("input-nombre").value;

            if(nombreUsuario.length > 0){
                sessionStorage.setItem("nombreUsuario", nombreUsuario) //se guarda el nombre de usuario
                window.location.href = "productos.html"; //hacemos la renderizacion
            }

        })
    </script>

</body>
</html>
