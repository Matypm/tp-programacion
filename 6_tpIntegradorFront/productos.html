<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Casaca</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet">

    <!-- CDN PARA USAR JSPDF -->
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>

    <link rel="icon" href="./img/logoCasaca.png">

    <link rel="stylesheet" href="./css/styles.css">
    <script defer src = "./js/main.js"></script>

</head>
<body>
    <header>
        <div class = "contenedor-header">
            <div>
                <a class= "contenedor-img-nombre" href="productos.html">
                    <img class= "logo-img" src="./img/logoCasaca.png" alt="iconoPagina">
                    <h1 class= "titulo-header">Mundo Casaca</h1>
                </a>
            </div>
            <input type="text" placeholder="Buscar..." class="barra-busqueda">

            <div class="carrito-header">
            <span>Carrito: <span id="contador-carrito">0</span> productos</span>
            </div>
            <div class="div-cerrar-sesion">
                <button class="btn-cerrar-sesion" onclick="cerrarSesion()">Cerrar sesion</button>
            </div>
        </div>
    </header>

    <main>
        
        <div id="saludo-usuario">
        </div>
        <section class ="section-prod-seleccion">
            <div class = "div-categoria-prod">
                <h2 class="h2-categoria-prod">Seleccion</h2>
            </div>
            <ul class = "ul-prod-seleccion">
            </ul>
        </section>

        

        <section class="section-prod-clubes">
            <div class = "div-categoria-prod">
                <h2 class="h2-categoria-prod">Clubes</h2>
            </div>
            <ul class = "ul-prod-clubes">
            </ul>
        </section>
        

        <section class ="section-carrito">
            <div class = "div-carrito-prods">
                <h2 class="text-carrito">Carrito</h2>
                <div class = "elementos-carrito">
                    <!-- <div id="items-carrito">
                        <p>Camiseta de Boca - $20000</p>
                        <button class="btn-eliminar-item" onclick="eliminar-producto">Eliminar</button>
                    </div> -->
                    <!-- <p>No hay elementos en el carrito.</p> -->
                </div>
            </div>
            <div class="total-carrito">
		        <p>Total: <span id="precio-total">$0.00</span></p>
		    </div>
            <div class="btn-carrito">
                <button class= "hidden" id="btn-vaciar-carrito" onclick="vaciarCarrito()">Vaciar Carrito</button>
                <button class= "hidden" id="btn-pagar-carrito">Imprimir ticket</button>
            </div>
		</section>
    </main>

    <footer>
    </footer>
</body>
</html>
