<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <!-- Preset CSS -->
    <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura-vader.css" type="text/css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/pumpernic-cuadrado.png" alt="logo pumpernic">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="form-productos">
            <h2>Consultar producto por id: </h2>
            
            <form id="getProduct-form">
                <label for="idProd">Id del producto</label>
                <input type="number" name="idProd" id="idProd" required>

                <input type="submit" value="Consultar producto">
            </form>
        </section>

        <section class="secccion-productos">
            <hr>
            <div id="contenedor-productos">
            <!--                 
                <ul>
                    <li class="lista-producto">
                        <img src="https://pointlaventanita.com/wp-content/uploads/2024/05/chabona.webp" alt="Fernet Cola Chabona">
                        <p>Id: 41 / Nombre: Fernet Cola Chabona / <strong>Precio: $4200</strong></p>
                        <input type="button" id="deleteProduct-button" value="Eliminar Producto">
                    </li>
                </ul> 
            -->    
            </div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById("contenedor-productos");
        const getProductForm = document.getElementById("getProduct-form");

        getProductForm.addEventListener("submit", async event => {
            event.preventDefault(); //Evitamos el envio por defecto HTML del formulario

            // Extraemos el id del producto
            const idProd = event.target.idProd.value.trim();
            
            try {
                // Vamos a hacer el fetch a una URL personalizada
                const response = await fetch(`http://localhost:3000/api/products/${idProd}`);
                console.log(response);

                // Procesamos los datos que devuelve el servidor
                const datos = await response.json();
                console.log(datos);

                const producto = datos.payload[0];

                console.log(producto); 
                /* {
                    "id": 41,
                    "name": "Fernet Cola Chabona",
                    "image": "https://pointlaventanita.com/wp-content/uploads/2024/05/chabona.webp",
                    "category": "drink",
                    "price": "4300.00",
                    "active": 1
                }*/

                renderizarProducto(producto);

            } catch (error) {
                console.error("Error al obtener el producto");
            }
        });

        function renderizarProducto(producto) {
            let htmlProducto = `
            <ul>
                <li class="lista-producto">
                    <img src="${producto.image}" alt="${producto.name}">
                    <p>Id: ${producto.id} / Nombre: ${producto.name} / <strong>Precio: $${producto.price}</strong></p>
                    <input type="button" id="deleteProduct-button" value="Eliminar Producto">
                </li>
            </ul>
            `;

            contenedorProductos.innerHTML = htmlProducto;

            // Otra opcion seria agregando el atributo onclick="nombrefuncion"

            const deleteProductButton = document.getElementById("deleteProduct-button");

            deleteProductButton.addEventListener("click", event => {
                event.stopPropagation();

                const confirmacion = confirm("Querés eliminar este producto?");

                if(!confirmacion) {
                    alert("Eliminacion cancelada");
                } else {
                    eliminarProducto(producto.id);
                }
            });
        }

        // Funcion para realizar una operacion delete
        async function eliminarProducto(id) {
            try {
                const response = await fetch(`http://localhost:3000/api/products/${id}`, {
                    method: "DELETE"
                });

                const result = await response.json();

                alert(result.message);
                console.log(result.message);

                // Limpiamos visualmente el producto que eliminamos de la pantalla
                contenedorProductos.innerHTML = "";

            } catch (error) {
                console.error("Error en la solicitud DELETE: ", error);
                alert("Ocurrio un error al eliminar un producto");
            }
        }
        
    </script>
    
</body>
</html>
